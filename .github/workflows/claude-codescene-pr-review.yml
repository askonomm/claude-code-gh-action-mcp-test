name: Claude CodeScene PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create CodeScene MCP config
        run: |
          cat > /tmp/mcp-config.json <<'EOF'
          {
            "mcpServers": {
              "codescene": {
                "command": "npx",
                "args": ["@codescene/codehealth-mcp"],
                "env": {
                  "CS_ACCESS_TOKEN": "${{ secrets.CODESCENE_ACCESS_TOKEN }}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE BRANCH: ${{ github.base_ref }}

            Perform only a CodeScene MCP code health review for this PR.

            Required behavior:
            1) Use CodeScene MCP tools to analyze the change set against the base branch.
            2) Include CodeScene metrics in the PR comment:
               - Overall change-set quality gate (passed/failed)
               - Per-file verdicts from the change-set analysis (improved/stable/degraded)
               - Numeric Code Health score for each degraded file
            3) Summarize only code health degradations, maintainability risks, and technical debt findings.
            4) Post exactly one concise PR comment with findings and concrete refactoring actions using: gh pr comment ${{ github.event.pull_request.number }} --body "...".

            Constraints:
            - Do not run unrelated checks.
            - Do not ask follow-up questions.
            - Do not iterate after posting the single summary comment.
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Bash(gh pr comment:*),mcp__codescene__codescene_analyze_change_set,mcp__codescene__codescene_code_health_score"
