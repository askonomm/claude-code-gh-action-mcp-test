name: Claude CodeScene PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install CodeScene MCP binary with retries
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Install attempt ${attempt}/3"
            if curl -fsSL -o /tmp/cs-mcp.zip "https://github.com/codescene-oss/codescene-mcp-server/releases/download/MCP-1.0.5/cs-mcp-linux-amd64.zip"; then
              unzip -o /tmp/cs-mcp.zip -d /tmp
              install -m 0755 /tmp/cs-mcp-linux-amd64 /usr/local/bin/cs-mcp
              if cs-mcp --help >/dev/null 2>&1; then
                echo "CodeScene MCP binary installed successfully"
                break
              fi
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install CodeScene MCP binary after 3 attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Warm up CodeScene MCP with retries
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Warmup attempt ${attempt}/3"
            if timeout 45s cs-mcp >/tmp/cs-mcp-warmup.log 2>&1; then
              echo "CodeScene MCP warmup completed"
              break
            fi
            if grep -q "CodeScene MCP server started" /tmp/cs-mcp-warmup.log 2>/dev/null; then
              echo "CodeScene MCP started during warmup timeout"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "CodeScene MCP warmup failed after 3 attempts" >&2
              cat /tmp/cs-mcp-warmup.log >&2 || true
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE BRANCH: ${{ github.base_ref }}
            GIT REPOSITORY PATH: ${{ github.workspace }}

            Perform only a CodeScene MCP code health review for this PR.

            Required behavior:
            1) First call mcp__codescene__analyze_change_set with:
               - base_ref: ${{ github.base_ref }}
               - git_repository_path: ${{ github.workspace }}
            2) For each degraded file returned by that tool, call mcp__codescene__code_health_score for that file.
            3) Include CodeScene metrics in the PR comment:
               - Overall change-set quality gate (passed/failed)
               - Per-file verdicts from the change-set analysis (improved/stable/degraded)
               - Numeric Code Health score for each degraded file
            4) Summarize only code health degradations, maintainability risks, and technical debt findings.
            5) Post exactly one concise PR comment with findings and concrete refactoring actions using: gh pr comment ${{ github.event.pull_request.number }} --body "...".
            6) If CodeScene MCP tools are unavailable, post one short PR comment that states MCP was unavailable and stop.

            Constraints:
            - Do not run gh pr diff, gh pr view, or gh auth commands.
            - Do not ask follow-up questions.
            - Do not iterate after posting the single summary comment.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 12
            --mcp-config '{"mcpServers":{"codescene":{"command":"cs-mcp","args":[],"env":{"CS_ACCESS_TOKEN":"${{ secrets.CODESCENE_ACCESS_TOKEN }}","CS_DISABLE_VERSION_CHECK":"1"}}}}'
            --allowedTools "Bash(gh pr comment:*),mcp__codescene__analyze_change_set,mcp__codescene__code_health_score"
