name: Claude CodeScene Uplift

on:
  issue_comment:
    types: [created]

jobs:
  uplift:
    if: github.event.issue.pull_request != null && contains(github.event.comment.body, '/uplift')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Get PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('same_repo', String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));

      - name: Skip fork PRs
        if: steps.pr.outputs.same_repo != 'true'
        run: |
          gh pr comment "${{ steps.pr.outputs.pr_number }}" --body "Skipping /uplift: this workflow only auto-commits for PR branches in the same repository."

      - name: Checkout PR branch
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Install CodeScene MCP binary
        if: steps.pr.outputs.same_repo == 'true'
        run: |
          curl -fsSL -o /tmp/cs-mcp.zip "https://github.com/codescene-oss/codescene-mcp-server/releases/download/MCP-1.0.5/cs-mcp-linux-amd64.zip"
          unzip -o /tmp/cs-mcp.zip -d /tmp
          install -m 0755 /tmp/cs-mcp-linux-amd64 /usr/local/bin/cs-mcp
          cs-mcp --help >/dev/null || true

      - name: Warm up CodeScene MCP binary download
        if: steps.pr.outputs.same_repo == 'true'
        run: |
          timeout 45s cs-mcp >/tmp/cs-mcp-warmup.log 2>&1 || true

      - name: Create CodeScene MCP config
        if: steps.pr.outputs.same_repo == 'true'
        run: |
          cat > /tmp/mcp-config.json <<'EOF'
          {
            "mcpServers": {
              "codescene": {
                "command": "cs-mcp",
                "args": [],
                "env": {
                  "CS_ACCESS_TOKEN": "${{ secrets.CODESCENE_ACCESS_TOKEN }}",
                  "CS_DISABLE_VERSION_CHECK": "1"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code uplift
        if: steps.pr.outputs.same_repo == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.pr_number }}
            BASE BRANCH: ${{ steps.pr.outputs.base_ref }}
            HEAD BRANCH: ${{ steps.pr.outputs.head_ref }}
            GIT REPOSITORY PATH: ${{ github.workspace }}

            The user requested /uplift.

            Required behavior:
            1) First, call mcp__codescene__analyze_change_set for this PR against BASE BRANCH.
               This is a hard prerequisite for any code edits.
            2) Identify files with degraded code health and refactor those files to improve maintainability.
            3) Refactor in a loop: after each file change, run mcp__codescene__code_health_review again for that file.
            4) Continue iterative refactoring until each targeted file reaches Code Health 10.0, or no further safe improvement is possible.
            5) Include before/after Code Health metrics in one PR comment.
            6) Commit and push the uplift changes to HEAD BRANCH.

            Constraints:
            - Keep changes focused on code health and maintainability.
            - Do not change workflow files.
            - Do not proceed with refactoring based on prior comments or assumptions.
            - If CodeScene MCP tools are unavailable in this run, post one PR comment saying "CodeScene MCP unavailable; uplift aborted" and stop.
            - If no code changes are needed, post one PR comment saying no uplift changes were required.
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --model claude-opus-4-6
            --max-turns 20
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git status:*),Bash(git diff:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr comment:*),mcp__codescene__analyze_change_set,mcp__codescene__code_health_score,mcp__codescene__code_health_review"
